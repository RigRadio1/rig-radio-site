<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rig-Radio — Sign In</title>
  <link rel="stylesheet" href="/rr.css" />

  <style>
    body.auth-page{
      min-height:100vh;
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(255,90,24,.16), transparent 34%),
        radial-gradient(circle at top right, rgba(255,34,34,.12), transparent 30%),
        #070707 !important;
      color:#f4f1ea;
    }

    .auth-topbar{
      max-width:1280px;
      margin:0 auto;
      padding:18px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .auth-brand{
      white-space:nowrap;
      color:#ff7a2f;
      text-decoration:none;
      font-weight:1000;
      letter-spacing:.03em;
    }

    .auth-nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-end;
    }

    .auth-nav a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,106,42,.65);
      background:rgba(255,106,42,.08);
      color:#fff;
      text-decoration:none;
      font-weight:900;
      font-size:.78rem;
      letter-spacing:.04em;
    }

    .auth-nav a:hover{
      background:linear-gradient(135deg, #ff6a2a, #d92f24);
      box-shadow:0 0 22px rgba(255,106,42,.26);
    }

    main{
      max-width:1280px;
      margin:0 auto;
      padding:12px 22px 46px;
    }

    .auth-layout{
      display:grid;
      grid-template-columns:minmax(0, 1.35fr) minmax(360px, 460px);
      gap:22px;
      align-items:stretch;
    }

    .auth-hero{
      position:relative;
      overflow:hidden;
      min-height:520px;
      padding:42px;
      border-radius:30px;
      border:1px solid rgba(255,106,42,.34);
      background:
        radial-gradient(circle at top left, rgba(255,106,42,.24), transparent 36%),
        linear-gradient(135deg, rgba(255,106,42,.18), rgba(217,47,36,.09)),
        rgba(10,10,10,.92);
      box-shadow:0 26px 90px rgba(0,0,0,.46);
      display:flex;
      align-items:flex-end;
    }

    .auth-hero-ghost{
      position:absolute;
      right:-18px;
      bottom:-30px;
      color:rgba(255,255,255,.045);
      font-size:clamp(5rem, 14vw, 12rem);
      font-weight:1000;
      letter-spacing:.04em;
      line-height:.8;
      pointer-events:none;
      user-select:none;
    }

    .auth-hero-content{
      position:relative;
      z-index:2;
      max-width:720px;
    }

    .auth-kicker{
      margin:0 0 10px;
      color:#ff7a2f;
      font-size:.8rem;
      font-weight:1000;
      letter-spacing:.16em;
    }

    .auth-hero h1{
      margin:0 0 10px;
      color:#fff;
      font-size:clamp(2.8rem, 7vw, 6rem);
      line-height:.92;
      letter-spacing:-.05em;
    }

    .auth-hero p{
      margin:0;
      color:rgba(244,241,234,.78);
      font-size:1.05rem;
      line-height:1.55;
    }

    .card{
      border-radius:28px !important;
      padding:30px !important;
      background:
        linear-gradient(145deg, rgba(255,255,255,.075), rgba(255,255,255,.025)),
        rgba(9,9,9,.88) !important;
      border:1px solid rgba(255,255,255,.085) !important;
      box-shadow:0 18px 56px rgba(0,0,0,.28) !important;
      align-self:center;
    }

    .card h1{
      margin-top:0;
      color:#fff;
      font-size:2rem;
      letter-spacing:-.03em;
    }

    .card label{
      display:block;
      margin:14px 0 7px;
      color:rgba(244,241,234,.72);
      font-weight:800;
      font-size:.86rem;
    }

    .card input{
      width:100%;
      min-height:46px;
      box-sizing:border-box;
      border-radius:999px;
      border:1px solid rgba(255,106,42,.35);
      background:rgba(255,255,255,.055);
      color:#fff;
      padding:0 15px;
      outline:none;
    }

    .card input:focus{
      border-color:rgba(255,106,42,.85);
      box-shadow:0 0 0 3px rgba(255,106,42,.12);
    }

    .btn-primary{
      width:100%;
      min-height:46px;
      margin-top:18px;
      border-radius:999px;
      border:1px solid rgba(255,106,42,.75);
      background:linear-gradient(135deg, #ff6a2a, #d92f24);
      color:#fff;
      font-weight:1000;
      cursor:pointer;
    }

    .btn-primary:hover{
      background:linear-gradient(135deg, #ff7a3a, #ff3b3b);
    }

    .auth-switch{
      text-align:center;
      color:rgba(244,241,234,.72);
    }

    .auth-switch a{
      color:#ff7a2f;
      font-weight:900;
      text-decoration:none;
    }

    @media (max-width:900px){
      .auth-layout{
        grid-template-columns:1fr;
      }

      .auth-hero{
        min-height:300px;
      }
    }
  </style>


  <style>
    /* LOGIN PAGE FINAL TIGHTEN */
    .auth-topbar{
      justify-content:center !important;
      padding:18px 24px 10px !important;
    }

    .auth-brand{
      color:#ff7a2f !important;
      font-size:.95rem !important;
      text-align:center !important;
    }

    main{
      max-width:980px !important;
      padding:14px 22px 42px !important;
    }

    .auth-layout{
      display:grid !important;
      grid-template-columns:1fr !important;
      gap:18px !important;
      align-items:start !important;
      justify-items:center !important;
    }

    .auth-hero{
      width:100% !important;
      min-height:235px !important;
      padding:30px 34px !important;
      align-items:center !important;
      border-radius:28px !important;
    }

    .auth-hero h1{
      font-size:clamp(2.4rem, 6vw, 4.2rem) !important;
      line-height:.95 !important;
    }

    .auth-hero p{
      max-width:620px !important;
      font-size:.98rem !important;
    }

    .auth-hero-ghost{
      font-size:clamp(4rem, 14vw, 8rem) !important;
      right:-10px !important;
      bottom:-16px !important;
    }

    .card{
      width:min(520px, 100%) !important;
      max-width:520px !important;
      align-self:auto !important;
      margin:0 auto !important;
      border-radius:26px !important;
      background:
        linear-gradient(145deg, rgba(255,255,255,.075), rgba(255,255,255,.025)),
        rgba(9,9,9,.92) !important;
      border:1px solid rgba(255,106,42,.24) !important;
      box-shadow:0 20px 70px rgba(0,0,0,.42) !important;
    }

    .card h1{
      color:#fff !important;
      text-align:center !important;
      font-size:1.65rem !important;
      letter-spacing:-.02em !important;
    }

    .card label{
      color:rgba(244,241,234,.78) !important;
      text-align:left !important;
    }

    .card input{
      background:rgba(255,255,255,.06) !important;
      border:1px solid rgba(255,106,42,.34) !important;
      color:#fff !important;
      -webkit-text-fill-color:#fff !important;
      caret-color:#fff !important;
    }

    .card input:-webkit-autofill,
    .card input:-webkit-autofill:hover,
    .card input:-webkit-autofill:focus{
      -webkit-text-fill-color:#fff !important;
      box-shadow:0 0 0 1000px #151515 inset !important;
      border:1px solid rgba(255,106,42,.44) !important;
      transition:background-color 9999s ease-in-out 0s !important;
    }

    .btn-primary{
      background:linear-gradient(135deg, #ff6a2a, #d92f24) !important;
      border:1px solid rgba(255,106,42,.8) !important;
      color:#fff !important;
    }

    .auth-switch{
      margin-bottom:0 !important;
    }

    @media (max-width:700px){
      .auth-hero{
        min-height:210px !important;
        padding:26px 22px !important;
      }
    }
    /* END LOGIN PAGE FINAL TIGHTEN */
  </style>

</head>

<body class="auth-page">
  <header class="auth-topbar">
    <a class="auth-brand" href="/">RIG-RADIO</a>
  </header>

  <main>
    <div class="auth-layout">
      <section class="auth-hero">
        <div class="auth-hero-ghost">LOGIN</div>
        <div class="auth-hero-content">
          <p class="auth-kicker">RIG-RADIO MEMBERS</p>
          <h1>Welcome Back</h1>
          <p>Sign in to manage your profile, playlists, songs, and creator tools.</p>
        </div>
      </section>

      <!-- Sign-in Card -->
      <div class="card">
        <h1>Sign in to your account</h1>

        <form id="login-form" autocomplete="on" novalidate>
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input id="password" type="password" name="password" placeholder="Your password" required />

          <button type="submit" class="btn-primary">Sign In</button>

          <p class="auth-switch">Don’t have an account? <a href="/create-account">Create one</a></p>
        </form>
      </div>
    </div>
  </main>

  <!-- 1) Load Supabase UMD FIRST (gives window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- 2) Login handler: redirect on SIGNED_IN; fallback check + spinner reset -->
  <script>
    (function () {
      const SUPABASE_URL  = "https://tpzpeoqdpfwqumlsyhpx.supabase.co";
      const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwenBlb3FkcGZ3cXVtbHN5aHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwMDM5NTEsImV4cCI6MjA3MjU3OTk1MX0.nP8W_G_N9GKucj6tlzyvSAOjhiqTBD-F564i0gNhp8E";

      // Create client with session persistence
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
      });

      
      const params = new URLSearchParams(window.location.search);
      const redirectParam = params.get("redirect") || "";
      const safeRedirect = redirectParam.startsWith("/") && !redirectParam.startsWith("//")
        ? redirectParam
        : "/dashboard";
      const form = document.getElementById('login-form');
      const btn  = form?.querySelector('.btn-primary');

      // Redirect as soon as Supabase confirms a signed-in session
      const { data: sub } = sb.auth.onAuthStateChange(async (event) => {
        if (event === 'SIGNED_IN') {
          window.location.href = safeRedirect;
        }
      });

      form?.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email    = document.getElementById('email')?.value?.trim() || "";
        const password = document.getElementById('password')?.value || "";
        if (!email || !password) { form.reportValidity(); return; }

        if (btn) { btn.disabled = true; btn.textContent = 'Signing in…'; }

        const { error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
          alert('Sign-in failed: ' + error.message);
          return;
        }

        // Safety net: if SIGNED_IN event doesn’t arrive quickly, verify session and proceed
        setTimeout(async () => {
          try {
            const u = (await sb.auth.getUser())?.data?.user || null;
            if (u) {
              window.location.href = safeRedirect;
              return;
            }
          } catch (_) {}
          // Session still not available; reset UI so user isn’t stuck
          if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }
          alert('Login succeeded but session is slow. Please press Sign In again.');
        }, 3000);
      });

      // Clean up subscription on unload (not strictly required for a simple page)
      window.addEventListener('beforeunload', () => { try { sub.subscription?.unsubscribe(); } catch(_){} });
    })();
  </script>

  <!-- 3) Header / Auth quicklink renderer (uses display_name or “Account”, never email) -->
  <script src="/auth.js" defer></script>
</body>
</html>
