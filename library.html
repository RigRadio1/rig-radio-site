<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Canonical host guard: force www -->
  <script>
  (function(){
    var want = 'www.rig-radio.ai';
    if (location.hostname !== want) {
      var target = 'https://' + want + location.pathname + location.search + location.hash;
      location.replace(target);
    }
  })();
  </script>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Library — Rig-Radio</title>
  <link rel="stylesheet" href="/rr.css?v=ROLLBACK"/>
  <style>
    .wrap{max-width:1100px;margin:28px auto;padding:0 16px;}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .status{opacity:.9}
    .error{color:#f66;font-weight:700}
    .list{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;align-items:start}

    .row{
      position:relative;
      display:grid;
      grid-template-columns:112px 1fr;
      gap:16px;
      align-items:start;
      background:radial-gradient(circle at top left, rgba(255,122,24,.18), transparent 32%), linear-gradient(145deg, rgba(15,17,25,.96), rgba(7,8,12,.96));
      padding:14px;
      border-radius:22px;
      border:1px solid rgba(255,122,24,.24);
      box-shadow:0 18px 44px rgba(0,0,0,.42), inset 0 0 0 1px rgba(255,255,255,.04);
      overflow:hidden;
    }

    .t{position:relative;z-index:1}

    .thumb{
      width:112px;
      height:112px;
      border-radius:18px;
      background:#0c0d12;
      border:1px solid rgba(255,122,24,.34);
      object-fit:cover;
      box-shadow:0 12px 26px rgba(0,0,0,.45);
    }

    .meta{position:relative;z-index:1;display:flex;flex-direction:column;gap:7px;min-width:0}
    .title{font-size:1.05rem;line-height:1.15;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pill{font-size:11px;padding:3px 9px;border-radius:999px;background:rgba(255,122,24,.12);border:1px solid rgba(255,122,24,.34);color:#ffb36b;display:inline-block;margin-top:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}

    .plbtn,
    .like-btn{
      border-radius:999px !important;
      border:1px solid rgba(255,122,24,.45) !important;
      background:rgba(255,122,24,.12) !important;
      color:#fff !important;
      font-weight:800;
    }

    .p{
      position:relative;
      z-index:1;
      grid-column:1/-1;
      background:rgba(0,0,0,.36);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      min-height:58px;
    }

    @media (max-width:760px){
      .list{grid-template-columns:1fr}
      .row{grid-template-columns:92px 1fr}
      .thumb{width:92px;height:92px}
    }
    .live{width:10px;height:10px;border-radius:50%;background:#3a3a3a;box-shadow:none;transition:all .2s ease}
    .live.on{background:#2f2;box-shadow:0 0 8px #2f2}

    /* Tweak native controls */
    .p audio{flex:1;filter:invert(1) hue-rotate(180deg); accent-color:#ff2a3a}
    /* Hide download UI where supported */
    .p audio::-webkit-media-controls-download-button{display:none}
    .p audio::-webkit-media-controls-enclosure{overflow:hidden}
    .p audio::-webkit-media-controls-panel{--_rr:none}
    /* Make timeline glow red (best-effort on WebKit/Blink) */
    .p audio::-webkit-media-controls-timeline{filter:hue-rotate(330deg) saturate(4) brightness(1.3)}
  </style>
</head>
<body class="rr-bg">
<div id="bg"></div>


  <header class="rr-topbar">
    <div class="rr-topbar-left">LIBRARY</div>
    <nav class="rr-topbar-right">
      <a class="rr-link" href="/dashboard">Dashboard</a>
      <a class="rr-link" href="/submit.html">Submit</a>
    </nav>
  </header>

  <main class="wrap">
    <div class="top">
      <div id="step" class="status">Loading…</div>
      <div id="auth" class="status"></div>
    </div>
    <div id="fatal" class="error"></div>
<!-- Library search (artist + genre) -->
  <div class="hero-banner">
    <img src="/banner.png" alt="Rig-Radio Banner">
  </div>
<form id="lib-search" class="lib-search" action="" onsubmit="return false;" style="display:flex;gap:10px;align-items:center;margin:12px 0 10px 0;">
  <input id="sArtist" type="text" placeholder="Search by artist" style="flex:1;min-width:180px;padding:8px 10px;border:1px solid #444;border-radius:8px;background:#0e0e0e;color:#fff;">
<select id="sGenre" style="flex:1;min-width:160px;padding:8px 10px;border:1px solid #444;border-radius:8px;background:#0e0e0e;color:#fff;">
  <option value="">Any Genre</option>
  <option>Rock</option><option>Metal</option><option>Pop</option>
  <option>Hip-Hop</option><option>EDM</option><option>House</option>
  <option>Techno</option><option>Drum &amp; Bass</option><option>Ambient</option>
  <option>Jazz</option><option>Blues</option><option>Country</option>
  <option>Folk</option><option>Classical</option><option>R&amp;B</option>
  <option>Reggae</option><option>Indie</option><option>Other</option>
</select>
<button id="sGo" type="button" class="rr-btn rr-primary">Search</button>
<button id="sClear" type="button" class="rr-btn rr-ghost">Clear</button>
  <select id="sSort" style="flex:0 0 180px; max-width:220px; padding:6px 10px; border:1px solid #444; border-radius:8px; background:#0e0e0e; color:#fff;">
    <option value="recent">Recent uploads</option>
    <option value="popular">Most popular (likes)</option>
    <option value="plays">Most played</option>
    <option value="az">Title A–Z</option>
  </select>
<button id="playAll" type="button" class="rr-btn rr-primary">Play Page</button>



</form>

<div id="pager-top" class="pager"></div>

  <div id="libCount" class="status"></div>
<section id="list" class="list"></section>
<div id="pager-bottom" class="pager"></div>


  </main>

<!-- Floating Now Playing pill -->
<div id="nowPlaying" class="now-playing" style="display:none;">
  <span id="npTitle">(no track playing)</span>
</div>

</body>
</html>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/library.js?v=PLAYLIST-PICKER-1"></script>
  <script src="/auth.js" defer></script>
