<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Canonical host guard: force www -->
  <script>
  (function(){
    var want = 'www.rig-radio.ai';
    if (location.hostname !== want) {
      var target = 'https://' + want + location.pathname + location.search + location.hash;
      location.replace(target);
    }
  })();
  </script>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Library — Rig-Radio</title>
  <link rel="stylesheet" href="/rr.css?v=ROLLBACK"/>
  <style>
    .wrap{max-width:1100px;margin:28px auto;padding:0 16px;}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .status{opacity:.9}
    .error{color:#f66;font-weight:700}
    .list{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;align-items:start}

    .row{
      position:relative;
      display:grid;
      grid-template-columns:112px 1fr;
      gap:16px;
      align-items:start;
      background:radial-gradient(circle at top left, rgba(255,122,24,.18), transparent 32%), linear-gradient(145deg, rgba(15,17,25,.96), rgba(7,8,12,.96));
      padding:14px;
      border-radius:22px;
      border:1px solid rgba(255,122,24,.24);
      box-shadow:0 18px 44px rgba(0,0,0,.42), inset 0 0 0 1px rgba(255,255,255,.04);
      overflow:hidden;
    }

    .t{position:relative;z-index:1}

    .thumb{
      width:112px;
      height:112px;
      border-radius:18px;
      background:#0c0d12;
      border:1px solid rgba(255,122,24,.34);
      object-fit:cover;
      box-shadow:0 12px 26px rgba(0,0,0,.45);
    }

    .meta{position:relative;z-index:1;display:flex;flex-direction:column;gap:7px;min-width:0}
    .title{font-size:1.05rem;line-height:1.15;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pill{font-size:11px;padding:3px 9px;border-radius:999px;background:rgba(255,122,24,.12);border:1px solid rgba(255,122,24,.34);color:#ffb36b;display:inline-block;margin-top:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}

    .plbtn,
    .like-btn{
      border-radius:999px !important;
      border:1px solid rgba(255,122,24,.45) !important;
      background:rgba(255,122,24,.12) !important;
      color:#fff !important;
      font-weight:800;
    }

    .p{
      position:relative;
      z-index:1;
      grid-column:1/-1;
      background:rgba(0,0,0,.36);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      min-height:58px;
    }

    @media (max-width:760px){
      .list{grid-template-columns:1fr}
      .row{grid-template-columns:92px 1fr}
      .thumb{width:92px;height:92px}
    }
    .live{width:10px;height:10px;border-radius:50%;background:#3a3a3a;box-shadow:none;transition:all .2s ease}
    .live.on{background:#2f2;box-shadow:0 0 8px #2f2}

    /* Tweak native controls */
    .p audio{flex:1;filter:invert(1) hue-rotate(180deg); accent-color:#ff2a3a}
    /* Hide download UI where supported */
    .p audio::-webkit-media-controls-download-button{display:none}
    .p audio::-webkit-media-controls-enclosure{overflow:hidden}
    .p audio::-webkit-media-controls-panel{--_rr:none}
    /* Make timeline glow red (best-effort on WebKit/Blink) */
    .p audio::-webkit-media-controls-timeline{filter:hue-rotate(330deg) saturate(4) brightness(1.3)}
    .title a{
      color:#fff;
      text-decoration:none;
    }

    .title a:hover{
      color:#ff7a2f;
    }
  
    /* LIBRARY NEW THEME */
    body.rr-bg{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(255,90,24,.16), transparent 34%),
        radial-gradient(circle at top right, rgba(255,34,34,.12), transparent 30%),
        #070707 !important;
      color:#f4f1ea;
    }

    .wrap{
      max-width:1280px !important;
      margin:24px auto 42px !important;
      padding:0 22px !important;
    }

    .rr-topbar{
      background:transparent !important;
      border:0 !important;
      box-shadow:none !important;
      padding:18px 24px !important;
    }

    .rr-topbar-left{
      color:#fff !important;
      font-weight:1000 !important;
      letter-spacing:.08em !important;
    }

    .hero-banner{
      position:relative;
      overflow:hidden;
      margin:14px 0 18px !important;
      border-radius:28px;
      border:1px solid rgba(255,106,42,.32);
      background:
        linear-gradient(135deg, rgba(255,106,42,.20), rgba(217,47,36,.12)),
        rgba(10,10,10,.92);
      box-shadow:0 24px 80px rgba(0,0,0,.38);
    }

    .hero-banner img{
      display:block;
      width:100%;
      max-height:250px;
      object-fit:cover;
      opacity:.88;
    }

    .top{
      padding:14px 18px;
      border-radius:18px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.075);
    }

    .lib-search{
      display:grid !important;
      grid-template-columns:1.4fr 1fr auto auto 210px auto !important;
      gap:12px !important;
      align-items:center !important;
      margin:18px 0 !important;
      padding:18px !important;
      border-radius:22px !important;
      background:
        linear-gradient(145deg, rgba(255,255,255,.075), rgba(255,255,255,.025)),
        rgba(9,9,9,.88) !important;
      border:1px solid rgba(255,255,255,.085) !important;
      box-shadow:0 18px 56px rgba(0,0,0,.28);
    }

    .lib-search input,
    .lib-search select{
      width:100% !important;
      min-height:42px !important;
      border-radius:999px !important;
      border:1px solid rgba(255,106,42,.35) !important;
      background:rgba(255,255,255,.055) !important;
      color:#fff !important;
      padding:0 14px !important;
      outline:none !important;
    }

    .lib-search input:focus,
    .lib-search select:focus{
      border-color:rgba(255,106,42,.85) !important;
      box-shadow:0 0 0 3px rgba(255,106,42,.12) !important;
    }

    .rr-btn,
    .lib-search button{
      min-height:42px !important;
      border-radius:999px !important;
      border:1px solid rgba(255,106,42,.75) !important;
      background:linear-gradient(135deg, #ff6a2a, #d92f24) !important;
      color:#fff !important;
      font-weight:900 !important;
      padding:0 18px !important;
      cursor:pointer !important;
    }

    .rr-btn:hover,
    .lib-search button:hover{
      background:linear-gradient(135deg, #ff7a3a, #ff3b3b) !important;
      transform:translateY(-1px);
    }

    .list{
      grid-template-columns:repeat(auto-fit,minmax(360px,1fr)) !important;
      gap:20px !important;
    }

    .row{
      background:
        linear-gradient(145deg, rgba(255,255,255,.075), rgba(255,255,255,.025)),
        rgba(9,9,9,.88) !important;
      border:1px solid rgba(255,255,255,.085) !important;
      transition:transform .2s ease, border-color .2s ease, background .2s ease;
    }

    .row:hover{
      transform:translateY(-2px);
      border-color:rgba(255,106,42,.48) !important;
      background:
        radial-gradient(circle at top left, rgba(255,106,42,.13), transparent 32%),
        rgba(12,12,12,.94) !important;
    }

    .thumb{
      border-color:rgba(255,106,42,.38) !important;
    }

    .pager{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      margin:16px 0;
    }

    #libCount{
      margin:10px 0 14px;
      color:rgba(244,241,234,.72);
      font-weight:800;
    }

    @media (max-width:1000px){
      .lib-search{
        grid-template-columns:1fr 1fr !important;
      }
    }

    @media (max-width:650px){
      .lib-search{
        grid-template-columns:1fr !important;
      }
      .list{
        grid-template-columns:1fr !important;
      }
    }
    /* END LIBRARY NEW THEME */

  
    /* LIBRARY HERO / NAV FIXES */
    .library-nav{
      max-width:1280px;
      margin:0 auto;
      display:flex !important;
      justify-content:space-between !important;
      align-items:center !important;
      gap:18px !important;
    }

    .library-nav .rr-topbar-left{
      font-size:1rem !important;
      color:#ff7a2f !important;
      white-space:nowrap !important;
      letter-spacing:.03em !important;
      word-spacing:0 !important;
      min-width:max-content !important;
    }

    .library-nav .rr-topbar-right{
      display:flex !important;
      flex-wrap:wrap !important;
      gap:10px !important;
      justify-content:flex-end !important;
      align-items:center !important;
    }

    .library-nav .rr-link,
    .library-logout{
      display:inline-flex !important;
      align-items:center !important;
      justify-content:center !important;
      min-height:38px !important;
      padding:0 14px !important;
      border-radius:999px !important;
      border:1px solid rgba(255,106,42,.65) !important;
      background:rgba(255,106,42,.08) !important;
      color:#fff !important;
      text-decoration:none !important;
      font-weight:900 !important;
      font-size:.78rem !important;
      letter-spacing:.04em !important;
      cursor:pointer !important;
    }

    .library-nav .rr-link:hover,
    .library-logout:hover{
      background:linear-gradient(135deg, #ff6a2a, #d92f24) !important;
      box-shadow:0 0 22px rgba(255,106,42,.26);
    }

    .top{
      display:none !important;
    }

    .library-hero{
      position:relative;
      overflow:hidden;
      min-height:245px;
      margin:18px 0 18px;
      padding:38px;
      border-radius:30px;
      border:1px solid rgba(255,106,42,.34);
      background:
        radial-gradient(circle at top left, rgba(255,106,42,.24), transparent 36%),
        linear-gradient(135deg, rgba(255,106,42,.18), rgba(217,47,36,.09)),
        rgba(10,10,10,.92);
      box-shadow:0 26px 90px rgba(0,0,0,.46);
    }

    .library-hero-ghost{
      position:absolute;
      right:-18px;
      bottom:-30px;
      color:rgba(255,255,255,.045);
      font-size:clamp(4.2rem, 13vw, 11rem);
      font-weight:1000;
      letter-spacing:.04em;
      line-height:.8;
      pointer-events:none;
      user-select:none;
    }

    .library-hero-content{
      position:relative;
      z-index:2;
      max-width:760px;
    }

    .library-kicker{
      margin:0 0 10px;
      color:#ff7a2f;
      font-size:.8rem;
      font-weight:1000;
      letter-spacing:.16em;
    }

    .library-hero h1{
      margin:0 0 10px;
      color:#fff;
      font-size:clamp(2.3rem, 6vw, 5rem);
      line-height:.95;
      letter-spacing:-.04em;
    }

    .library-hero p{
      margin:0;
      color:rgba(244,241,234,.76);
      font-size:1rem;
      line-height:1.55;
    }

    .library-profile-name{
      display:inline-flex;
      margin-top:18px;
      padding:9px 14px;
      border-radius:999px;
      border:1px solid rgba(255,106,42,.45);
      background:rgba(255,106,42,.10);
      color:#fff;
      font-weight:900;
      font-size:.86rem;
    }

    #libCount{
      display:inline-flex !important;
      align-items:center;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid rgba(255,106,42,.45);
      background:rgba(255,106,42,.10);
      color:#fff !important;
      font-weight:900 !important;
    }

    .page-btn{
      border:1px solid rgba(255,106,42,.55) !important;
      background:rgba(255,106,42,.08) !important;
      color:#fff !important;
      border-radius:999px !important;
      font-weight:900 !important;
    }

    .page-btn.is-current{
      background:linear-gradient(135deg, #ff6a2a, #d92f24) !important;
      border-color:rgba(255,255,255,.35) !important;
      box-shadow:0 0 22px rgba(255,106,42,.25);
    }

    .page-btn:not(:disabled):hover{
      background:rgba(255,106,42,.20) !important;
      border-color:rgba(255,106,42,.85) !important;
    }

    @media (max-width:760px){
      .library-hero{
        padding:28px 22px;
      }

      .library-nav{
        align-items:flex-start !important;
      }

      .library-nav .rr-topbar-right{
        justify-content:flex-start !important;
      }
    }
    /* END LIBRARY HERO / NAV FIXES */



  </style>
</head>
<body class="rr-bg">
<div id="bg"></div>


  <header class="rr-topbar library-nav">
    <div class="rr-topbar-left">RIG-RADIO</div>
    <nav class="rr-topbar-right">
      <a class="rr-link" href="/members/home.html">HOME</a>
      <a class="rr-link" href="/members/">MY PROFILE</a>
      <a class="rr-link" href="/submit.html">SUBMIT SONG</a>
      <a class="rr-link" href="/">LIVE</a>
      <button id="libraryLogout" type="button" class="rr-link library-logout">LOG OUT</button>
    </nav>
  </header>

  <main class="wrap">
    <div class="top">
      <div id="step" class="status">Loading…</div>

    </div>
    <div id="fatal" class="error"></div>
<!-- Library search (artist + genre) -->
  <section class="library-hero">
    <div class="library-hero-ghost">LIBRARY</div>
    <div class="library-hero-content">
      <p class="library-kicker">RIG-RADIO MUSIC LIBRARY</p>
      <h1>Discover Independent Artists</h1>
      <p>Search the catalog, play tracks, follow creators, and jump into the Sound Cards.</p>
      <div id="auth" class="library-profile-name"></div>
    </div>
  </section>
<form id="lib-search" class="lib-search" action="" onsubmit="return false;" style="display:flex;gap:10px;align-items:center;margin:12px 0 10px 0;">
  <input id="sArtist" type="text" placeholder="Search by artist" style="flex:1;min-width:180px;padding:8px 10px;border:1px solid #444;border-radius:8px;background:#0e0e0e;color:#fff;">
<select id="sGenre" style="flex:1;min-width:160px;padding:8px 10px;border:1px solid #444;border-radius:8px;background:#0e0e0e;color:#fff;">
  <option value="">Any Genre</option>
  <option>Rock</option><option>Metal</option><option>Pop</option>
  <option>Hip-Hop</option><option>EDM</option><option>House</option>
  <option>Techno</option><option>Drum &amp; Bass</option><option>Ambient</option>
  <option>Jazz</option><option>Blues</option><option>Country</option>
  <option>Folk</option><option>Classical</option><option>R&amp;B</option>
  <option>Reggae</option><option>Indie</option><option>Other</option>
</select>
<button id="sGo" type="button" class="rr-btn rr-primary">Search</button>
<button id="sClear" type="button" class="rr-btn rr-ghost">Clear</button>
  <select id="sSort" style="flex:0 0 180px; max-width:220px; padding:6px 10px; border:1px solid #444; border-radius:8px; background:#0e0e0e; color:#fff;">
    <option value="recent">Recent uploads</option>
    <option value="popular">Most popular (likes)</option>
    <option value="plays">Most played</option>
    <option value="az">Title A–Z</option>
  </select>
<button id="playAll" type="button" class="rr-btn rr-primary">Play Page</button>



</form>

<div id="pager-top" class="pager"></div>

  <div id="libCount" class="status"></div>
<section id="list" class="list"></section>
<div id="pager-bottom" class="pager"></div>


  </main>

<!-- Floating Now Playing pill -->
<div id="nowPlaying" class="now-playing" style="display:none;">
  <span id="npTitle">(no track playing)</span>
</div>

</body>
</html>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/library.js?v=SOUND-CARD-LINK-1"></script>
  <script src="/auth.js" defer></script>
