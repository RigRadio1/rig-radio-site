<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Rig-Radio | Create account</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root { --bg:#0b0b0c; --panel:#121214; --border:#1e1e22; --muted:#cfd2d7; --text:#fff; --accent:#D90429; }
    *{ box-sizing:border-box; } html,body{ height:100%; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; display:flex; flex-direction:column; }
    header{ padding:14px 18px; border-bottom:1px solid #222; display:flex; align-items:center; }
    header a{ color:#fff; text-decoration:none; font-weight:600; }
    #auth-quick{ margin-left:auto; }
    main{ flex:1; display:grid; place-items:center; padding:24px; }
    .card{ width:100%; max-width:420px; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px; box-shadow:0 8px 24px rgba(0,0,0,.35); }
    h1{ font-size:1.4rem; margin:0 0 1rem; }
    label{ display:block; font-size:.9rem; margin:.5rem 0 .35rem; color:var(--muted); }
    input{ width:100%; padding:12px; border-radius:10px; border:1px solid #2a2a2f; background:#0f0f12; color:#fff; }
    button{ margin-top:14px; width:100%; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-weight:700; cursor:pointer; }
    .muted{ color:#aab; font-size:.9rem; }
    .msg{ margin-top:.75rem; min-height:1.25em; }
    .navlinks{ margin-top:12px; text-align:center; }
    .error{ color:#ff6b6b; }
  </style>
    <link rel="stylesheet" href="/rr.css">

  <style>
    /* SIGNUP PAGE NEW THEME */
    body.auth-page{
      min-height:100vh;
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(255,90,24,.16), transparent 34%),
        radial-gradient(circle at top right, rgba(255,34,34,.12), transparent 30%),
        #070707 !important;
      color:#f4f1ea;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    .auth-topbar{
      max-width:980px;
      margin:0 auto;
      padding:18px 24px 10px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .auth-brand{
      color:#ff7a2f;
      text-decoration:none;
      font-weight:1000;
      letter-spacing:.03em;
      font-size:.95rem;
    }

    main{
      max-width:980px;
      margin:0 auto;
      padding:14px 22px 42px;
    }

    .auth-layout{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
      justify-items:center;
      align-items:start;
    }

    .auth-hero{
      position:relative;
      overflow:hidden;
      width:100%;
      min-height:235px;
      padding:30px 34px;
      border-radius:28px;
      border:1px solid rgba(255,106,42,.34);
      background:
        radial-gradient(circle at top left, rgba(255,106,42,.24), transparent 36%),
        linear-gradient(135deg, rgba(255,106,42,.18), rgba(217,47,36,.09)),
        rgba(10,10,10,.92);
      box-shadow:0 26px 90px rgba(0,0,0,.46);
      display:flex;
      align-items:center;
    }

    .auth-hero-ghost{
      position:absolute;
      right:-10px;
      bottom:-16px;
      color:rgba(255,255,255,.045);
      font-size:clamp(4rem, 14vw, 8rem);
      font-weight:1000;
      letter-spacing:.04em;
      line-height:.8;
      pointer-events:none;
      user-select:none;
    }

    .auth-hero-content{
      position:relative;
      z-index:2;
      max-width:660px;
    }

    .auth-kicker{
      margin:0 0 10px;
      color:#ff7a2f;
      font-size:.8rem;
      font-weight:1000;
      letter-spacing:.16em;
    }

    .auth-hero h1{
      margin:0 0 10px;
      color:#fff;
      font-size:clamp(2.4rem, 6vw, 4.2rem);
      line-height:.95;
      letter-spacing:-.05em;
    }

    .auth-hero p{
      margin:0;
      color:rgba(244,241,234,.78);
      font-size:.98rem;
      line-height:1.55;
    }

    .card{
      width:min(540px, 100%) !important;
      max-width:540px !important;
      margin:0 auto !important;
      padding:30px !important;
      border-radius:26px !important;
      background:
        linear-gradient(145deg, rgba(255,255,255,.075), rgba(255,255,255,.025)),
        rgba(9,9,9,.92) !important;
      border:1px solid rgba(255,106,42,.24) !important;
      box-shadow:0 20px 70px rgba(0,0,0,.42) !important;
    }

    .card h1{
      margin:0 0 10px !important;
      color:#fff !important;
      text-align:center !important;
      font-size:1.65rem !important;
      letter-spacing:-.02em !important;
    }

    .muted{
      color:rgba(244,241,234,.72) !important;
      text-align:center !important;
      line-height:1.45 !important;
    }

    .card label{
      display:block;
      margin:14px 0 7px;
      color:rgba(244,241,234,.78) !important;
      font-weight:800;
      font-size:.86rem;
    }

    .card input{
      width:100%;
      min-height:46px;
      border-radius:999px !important;
      border:1px solid rgba(255,106,42,.34) !important;
      background:rgba(255,255,255,.06) !important;
      color:#fff !important;
      -webkit-text-fill-color:#fff !important;
      padding:0 15px !important;
      outline:none;
    }

    .card input:focus{
      border-color:rgba(255,106,42,.85) !important;
      box-shadow:0 0 0 3px rgba(255,106,42,.12) !important;
    }

    .terms{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:10px;
      align-items:start;
      margin-top:14px;
    }

    .terms input{
      width:18px !important;
      min-height:18px !important;
      margin-top:3px;
      accent-color:#ff6a2a;
    }

    .terms label{
      margin:0 !important;
      line-height:1.4;
    }

    .btn-primary{
      width:100%;
      min-height:46px;
      margin-top:18px;
      border-radius:999px !important;
      border:1px solid rgba(255,106,42,.8) !important;
      background:linear-gradient(135deg, #ff6a2a, #d92f24) !important;
      color:#fff !important;
      font-weight:1000 !important;
      cursor:pointer;
    }

    .btn-primary:hover{
      background:linear-gradient(135deg, #ff7a3a, #ff3b3b) !important;
    }

    .auth-switch{
      text-align:center;
      color:rgba(244,241,234,.72);
      margin-bottom:0;
    }

    .auth-switch a{
      color:#ff7a2f;
      font-weight:900;
      text-decoration:none;
    }

    @media (max-width:700px){
      .auth-hero{
        min-height:210px;
        padding:26px 22px;
      }
    }
    /* END SIGNUP PAGE NEW THEME */
  </style>

</head>
<body class="auth-page">
  <header class="auth-topbar">
    <a class="auth-brand" href="/">RIG-RADIO</a>
  </header>

  <main>
    <div class="auth-layout">
      <section class="auth-hero">
        <div class="auth-hero-ghost">JOIN</div>
        <div class="auth-hero-content">
          <p class="auth-kicker">RIG-RADIO MEMBERS</p>
          <h1>Create Account</h1>
          <p>Build your member profile, upload songs, follow creators, and join the independent music network.</p>
        </div>
      </section>

      <div class="card">
  <h1>Create your account</h1>
  <p class="muted">Join Rig-Radio to upload tracks and videos, follow artists, and access member features.</p>

  <form id="signup-form" autocomplete="on" novalidate>
    <!-- Display Name -->
    <label for="display_name">Display Name</label>
    <input id="display_name" type="text" name="display_name" placeholder="Artist or listener name" required>

    <!-- Email -->
    <label for="email">Email</label>
    <input id="email" type="email" name="email" placeholder="you@example.com" required>

    <!-- Password -->
    <label for="password">Password</label>
    <input id="password" type="password" name="password" placeholder="Create a strong password" required>

    <!-- Terms -->
    <div class="terms">
      <input id="agree" type="checkbox" required>
      <label for="agree">I agree to the Terms and understand the Community Guidelines.</label>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-primary">Create Account</button>

    <!-- Switch -->
    <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
  </form>
</div>

    
  </main>

  <!-- Supabase Auth (Create Account) -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = "https://tpzpeoqdpfwqumlsyhpx.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwenBlb3FkcGZ3cXVtbHN5aHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwMDM5NTEsImV4cCI6MjA3MjU3OTk1MX0.nP8W_G_N9GKucj6tlzyvSAOjhiqTBD-F564i0gNhp8E";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const form = document.getElementById('signup-form');
  const btn  = document.querySelector('.btn-primary');

  form?.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!form.checkValidity()) { form.reportValidity(); return; }

    const displayName = document.getElementById('display_name')?.value?.trim() || "";
    const email       = document.getElementById('email')?.value?.trim() || "";
    const password    = document.getElementById('password')?.value || "";

    const agree = document.getElementById('agree');
    if (!agree?.checked) { alert('Please agree to the Terms to continue.'); return; }

    // Stash intended display name to backfill after first login if needed
    try { localStorage.setItem('pending_display_name', displayName); } catch(e) {}

    btn.disabled = true; btn.textContent = 'Creating…';

    // IMPORTANT: send display_name in user metadata
    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: { display_name: displayName }
      }
    });

    if (error) {
      btn.disabled = false; btn.textContent = 'Create Account';
      alert('Sign-up failed: ' + error.message);
      return;
    }

    // Send them to sign-in; login script will backfill metadata if needed
    window.location.href = '/login?welcome=1';
  });
</script>

<script src="/auth.js" defer></script>
</body>
</html>
